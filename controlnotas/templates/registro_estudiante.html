<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro de Estudiante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
    :root {
        --purple-main: #b888f8;
        --purple-dark: #8f42d9;
    }
    body { font-family: 'Poppins', sans-serif; background-color: #f6f4ff; margin: 0; padding: 0; }
    .page { min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .card { background-color: #ffffff; border-radius: 12px; padding: 24px; max-width: 560px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    .form-header h2 { color: var(--purple-main); margin: 0 0 18px; }
    .form-wrap label { color: #2f2f44; font-weight: 600; }
    .field input { width: 90%; padding: 9px 12px; border: 1px solid #d7d3ea; border-radius: 8px; margin-top: 5px; }
    .actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
    .primary-btn, .button.dashboard { font-family: 'Poppins', sans-serif; display: inline-block; background-color: var(--purple-main); color: #fff; border: none; border-radius: 10px; padding: 10px 15px; text-decoration: none; font-weight: bold; cursor: pointer; transition: all .2s ease; font-size: 15px; }
    .primary-btn:hover, .button.dashboard:hover { background-color: var(--purple-dark); }
    .alert { background-color: #fde2f7; color: #7a1e69; border: 1px solid #f7a2e5; padding: 8px 12px; border-radius: 8px; margin-bottom: 12px; }
</style>
</head>
<body>
<main class="page">
    <section class="card">
        <div class="form-wrap">
            <div class="form-header">
                <h2>Datos del estudiante</h2>
            </div>
            {% if error %}
            <div class="alert">{{ error }}</div>
            {% endif %}

            <form action="/insertar_estudiante/" method="POST" class="form-grid">
                <div class="field">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div class="grid-2">
                    <div class="field">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" name="edad" min="1" max="120" required>
                    </div>
                    <div class="field">
                        <label for="carrera">Carrera</label>
                        <input type="text" id="carrera" name="carrera" required>
                    </div>
                </div>

                <div class="grid-3">
                    <div class="field">
                        <label for="nota1">Nota 1</label>
                        <input type="number" id="nota1" name="nota1" step="0.01" required>
                    </div>
                    <div class="field">
                        <label for="nota2">Nota 2</label>
                        <input type="number" id="nota2" name="nota2" step="0.01" required>
                    </div>
                    <div class="field">
                        <label for="nota3">Nota 3</label>
                        <input type="number" id="nota3" name="nota3" step="0.01" required>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="primary-btn">Registrar estudiante</button>
                    <a class="button dashboard" href="/tablero/">Volver al tablero</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
